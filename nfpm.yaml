# nfpm configuration for LazyChad
# Generates .deb and .rpm packages automatically.

name: "lazychad"
arch: "all"
platform: "linux"
version: "1.3.4"
release: "1"
section: "default"
priority: "extra"
maintainer: "Mistan Khomdram <mistankhomdram@gmail.com>"
description: "An intelligent, highly-aesthetic Neovim wrapper built on NvChad"
vendor: "LazyChad"
homepage: "https://github.com/MistanKh/LazyChad"
license: "MIT"

contents:
  # Binaries
  - src: ./bin/lchad
    dst: /usr/bin/lchad
  - src: ./bin/lazychad-deps
    dst: /usr/bin/lazychad-deps
  
  # Core Config Files
  - src: ./init.lua
    dst: /usr/share/lazychad/init.lua
  - src: ./lua
    dst: /usr/share/lazychad/lua
  
  # Metadata
  - src: ./README.md
    dst: /usr/share/doc/lazychad/README.md
  - src: ./LICENSE
    dst: /usr/share/licenses/lazychad/LICENSE

scripts:
  # Using the existing logic for user-side cleanup if desired
  # but native packages usually don't touch home dirs.
  # We'll stick to a simple post-install notification for now.
  postinstall: ./scripts/linux-postinstall.sh
  postremove: ./scripts/linux-postremove.sh

# Dependencies that exist across Arch, Debian, and Fedora
depends:
  - neovim
  - git
  - ripgrep
  - curl
  - bash
  - make
  - unzip
  - gcc
